# Site metadata (written to .env.production before build)
site_name: Savely Danko
site_title: Savely Danko
site_description: >-
  Portfolio of Savely Danko, a full stack developer building responsive
  interfaces, scalable web applications, and modern digital products.

# Domain and repo settings
domain: dankosava.ru
repo_url: git@github.com:SaveliyDanko/savadanko-web.git
repo_branch: main

# Deploy key — path to the PRIVATE key on your LOCAL machine.
# The public key must be added to GitHub: repo → Settings → Deploy keys.
# Generate with: ssh-keygen -t ed25519 -C "deploy@dankosava.ru" -f ~/.ssh/savadanko_deploy
deploy_key_local_path: ~/.ssh/id_ed25519_github_personal
deploy_key_remote_path: /root/.ssh/id_ed25519_github_personal

# Paths on the server
app_dir: /var/www/savadanko
nginx_conf_name: savadanko

# Node.js version (via nvm or nodesource)
node_version: "22"

# Enable HTTPS via Certbot (requires valid domain pointing to server)
enable_ssl: true
certbot_email: dankosaveliy.m@gmail.com

# Admin panel backend
admin_port: 3001
# Generate hash: node -e "const b=require('bcryptjs');console.log(b.hashSync('yourpassword',12))"
admin_password_hash: "$2a$12$LlEMSNWVf7VZyGM68IhWOuz7RAf7oT2CXZd0bxTCjbLqo6YlnS126"
# Generate: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
admin_jwt_secret: "d0904bc0974858fa55435c2734f9c29c91cc4febcee9559d0393d5e57dc3b46b2ce6ce871adb58305a5ee034567b807a92df4271f7333674a58fa4077334fdfb"
