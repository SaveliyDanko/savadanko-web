---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - nginx
      - python3-certbot
    state: present
    update_cache: true

- name: Install Node.js {{ node_version }} via nodesource
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node

- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Clone / update repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ repo_branch }}"
    force: true
  notify: Reload nginx

- name: Install npm dependencies
  ansible.builtin.command:
    cmd: npm ci --prefer-offline
    chdir: "{{ app_dir }}"
  changed_when: true

- name: Write .env.production
  ansible.builtin.copy:
    dest: "{{ app_dir }}/.env.production"
    mode: "0640"
    content: |
      VITE_SITE_NAME={{ site_name }}
      VITE_SITE_TITLE={{ site_title }}
      VITE_SITE_DESCRIPTION={{ site_description }}
      VITE_SITE_URL=https://{{ domain }}

- name: Build production bundle
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ app_dir }}"
  changed_when: true

- name: Create webroot for ACME challenges
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

# Detect whether this is a clean VPS or one with existing sites.
# "Clean" means sites-enabled contains only the stock nginx default symlink.
- name: List enabled nginx sites
  ansible.builtin.find:
    paths: /etc/nginx/sites-enabled
    file_type: any
  register: enabled_sites

- name: Determine if only the stock default site is present
  ansible.builtin.set_fact:
    only_default_present: >-
      {{
        enabled_sites.files | map(attribute='path') | list
        | difference(['/etc/nginx/sites-enabled/default'])
        | length == 0
        and
        enabled_sites.files | map(attribute='path') | select('equalto', '/etc/nginx/sites-enabled/default') | list | length > 0
      }}

- name: Remove stock default site (clean VPS — no other sites)
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: only_default_present
  notify: Reload nginx

# Deploy HTTP-only config first so Certbot can pass the ACME challenge
- name: Deploy nginx config (HTTP only, pre-SSL)
  ansible.builtin.template:
    src: nginx-http.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_conf_name }}
    mode: "0644"
  when: enable_ssl
  notify: Reload nginx

- name: Deploy nginx config (HTTP only, SSL disabled)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_conf_name }}
    mode: "0644"
  when: not enable_ssl
  notify: Reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ nginx_conf_name }}
    dest: /etc/nginx/sites-enabled/{{ nginx_conf_name }}
    state: link
  notify: Reload nginx

- name: Flush handlers to apply nginx config before Certbot
  ansible.builtin.meta: flush_handlers

- name: Check if SSL certificate already exists
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
  register: ssl_cert
  when: enable_ssl

# certonly --webroot never touches other nginx configs
- name: Obtain SSL certificate via Certbot (webroot)
  ansible.builtin.command:
    cmd: >
      certbot certonly --webroot
      -w /var/www/certbot
      -d {{ domain }} -d www.{{ domain }}
      --non-interactive --agree-tos -m {{ certbot_email }}
  when: enable_ssl and not ssl_cert.stat.exists
  changed_when: true

# Deploy final HTTPS config only after certificate exists
- name: Deploy nginx config (HTTPS)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_conf_name }}
    mode: "0644"
  when: enable_ssl
  notify: Reload nginx

- name: Enable certbot auto-renew via systemd timer
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  when: enable_ssl
